name: Deploy to VPS

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            echo "===== DEPLOY $(date -Is) =====" | tee -a /home/gorm/fx-pipeline-csv/deploy.log
            /usr/local/bin/fx-deploy --no-init |& tee -a /home/gorm/fx-pipeline-csv/deploy.log
